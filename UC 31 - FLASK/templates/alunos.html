<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
        <h2>Lista de Alunos</h2>

    <table border="1">
        <tr>
            <th>Nome</th>
            <th>Matrícula</th>
        </tr>

        {% for aluno in alunos %}
        <tr>
            <td>{{ aluno.nome }}</td>
            <td>{{ aluno.matricula }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
